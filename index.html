<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Clothes | Tienda Online</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html">
                <img src="img/logo.png" alt="Crazy Clothes" class="nav-logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="#productos">Productos</a></li>
                <li><a href="https://instagram.com/crazyclothes73" target="_blank">Instagram</a></li>
            </ul>
        </nav>
        <div class="header-cart">
            <button onclick="abrirCarrito()" class="btn-cart">
                🛒 Carrito (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>CRAZY CLOTHES</h1>
            <p>Ropa para todas las edades. Calidad y estilo para tu familia.</p>
            <a href="#productos" class="btn-primary">VER PRODUCTOS</a>
        </div>
    </section>

    <section id="productos" class="container">
        <h2 class="section-title">Nuestros Destacados</h2>
        
        <div id="contenedor-productos" class="products-grid">
            </div>
    </section>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarCarrito()">&times;</span>
            <h2>Tu Carrito</h2>
            <div id="cart-items">
                </div>
            <div class="cart-footer">
                <hr>
                <p style="margin-top: 15px;">Total: <strong>$<span id="total-price">0</span></strong></p>
                <button onclick="enviarPedidoWhatsApp()" class="btn-whatsapp">
                    Finalizar Pedido por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <div id="notification-container" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
